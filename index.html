<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fa;
}
header{
  background:#fff;
  padding:20px;
  text-align:center;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.galaxy-title{
  font-size:38px;
  font-weight:900;
  background:linear-gradient(90deg,#00d4ff,#7c3aed,#ff00ff,#00d4ff);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:galaxyShift 5s linear infinite;
}
@keyframes galaxyShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.menu,.sub-menu,.station-panel{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  flex-wrap:wrap;
}
button{
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
  font-weight:bold;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 14px rgba(0,0,0,.1);
}
.red{
  color:red;
  font-weight:bold;
}
.small{
  font-size:13px;
  opacity:.7;
}
</style>
</head>
<body>

<header>
  <h1 class="galaxy-title">🚆 Ferrobloggers</h1>
  <p>Horarios ordenados • Actualización automática</p>
</header>

<div class="menu">
  <button onclick="cargarLinea('Mitre')">Mitre</button>
  <button onclick="cargarLinea('Roca')">Roca</button>
  <button onclick="cargarLinea('Sarmiento')">Sarmiento</button>
  <button onclick="cargarLinea('San Martín')">San Martín</button>
</div>

<div id="subMenu" class="sub-menu"></div>
<div id="horarios" class="grid"></div>

<script>
let lineaActual = ""
let ramalActual = ""

// Datos de estaciones
const datos = {
  Mitre:{
    Tigre:["Retiro","3 de Febrero","Belgrano C","Belgrano R","Drago","Núñez","Olivos","San Isidro","Tigre"],
    Suárez:["Retiro","Belgrano R","Coghlan","Saavedra","Miguelete","San Martín","José León Suárez"],
    "Bart. Mitre":["Retiro","Belgrano C","Vicente López","Florida","Bartolomé Mitre"]
  },
  Roca:{Principal:["Constitución","Avellaneda","Lanús","Lomas","Temperley","La Plata"]},
  Sarmiento:{Principal:["Once","Caballito","Flores","Liniers","Morón","Castelar","Moreno"]},
  "San Martín":{Principal:["Retiro","Palermo","Villa del Parque","Caseros","San Martín"]}
}

// Generar horarios ficticios
function generarHorarios(cantidad){
  const ahora = new Date()
  let base = ahora.getHours()*60 + ahora.getMinutes()
  return Array.from({length:cantidad},(_,i)=>{
    const total = base + (i+1)*7
    const h = Math.floor(total/60)%24
    const m = total%60
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`
  })
}

// Cargar línea: muestra solo los ramales
function cargarLinea(linea){
  lineaActual = linea
  ramalActual = "" // no hay ramal seleccionado
  renderSubmenu()
  document.getElementById("horarios").innerHTML = "" // limpia horarios
}

// Cargar ramal: muestra solo las estaciones
function cargarRamal(ramal){
  ramalActual = ramal
  renderEstaciones()
}

// Renderizar submenu de ramales
function renderSubmenu(){
  const sub = document.getElementById("subMenu")
  let botones = ""
  Object.keys(datos[lineaActual]).forEach(ramal=>{
    botones += `<button onclick="cargarRamal('${ramal}')">${ramal}</button>`
  })
  sub.innerHTML = botones
}

// Renderizar panel de estaciones
function renderEstaciones(){
  const estaciones = datos[lineaActual][ramalActual]
  const box = document.getElementById("horarios")
  let html = `<div class="card" style="grid-column:1/-1"><h3>🎛️ Elegir estación</h3><div class="station-panel">`
  estaciones.forEach(estacion=>{
    html += `<button onclick="mostrarEstacion('${estacion}')">${estacion}</button>`
  })
  html += `</div></div>`
  box.innerHTML = html
}

// Mostrar horarios de estación seleccionada
function mostrarEstacion(estacion){
  const estaciones = datos[lineaActual][ramalActual]
  const horarios = generarHorarios(estaciones.length)
  const i = estaciones.indexOf(estacion)
  document.getElementById("horarios").innerHTML = `
    <div class="card">
      <h3>🚆 ${lineaActual}</h3>
      <p><b>Ramal:</b> ${ramalActual}</p>
      <p>📍 ${estacion}</p>
      <h2>${horarios[i]}</h2>
      <button onclick="renderEstaciones()">⬅ Volver</button>
    </div>
  `
}

// ✅ No llamamos a cargarLinea al inicio
// La página inicia completamente limpia (solo líneas)
</script>

</body>
</html>
