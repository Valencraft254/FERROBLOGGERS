<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:white;padding:20px;min-height:100vh;}
h1{text-align:center;margin-bottom:25px;font-size:40px;letter-spacing:2px;}
.search-box{max-width:600px;margin:0 auto 30px auto;position:relative;}
.search-box input{width:100%;padding:15px 20px 15px 50px;border:none;border-radius:15px;background:#111;color:white;font-size:18px;outline:none;border:2px solid #333;}
.search-box input::placeholder{color:rgba(255,255,255,0.25);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:gray;font-size:20px;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:25px;}
.card{background:#111;padding:25px;border-radius:20px;position:relative;overflow:hidden;box-shadow:0 0 20px rgba(255,255,255,0.1);border:2px solid #333;}
.card h2{margin-bottom:10px;font-size:24px;}
.aprox{color:red;font-weight:bold;font-size:18px;margin-bottom:10px;}
.time{font-size:18px;margin:10px 0;}
.countdown{font-size:22px;font-weight:bold;margin-top:15px;}
.days{color:#aaa;margin-top:10px;}
</style>
</head>
<body>

<h1>🌌 Ferrobloggers</h1>
<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Ferrobloggers" id="searchInput">
</div>

<div class="container">

<!-- NCA Luis María Drago -->
<div class="card" id="ncaCard">
    <h2>NCA • Luis María Drago</h2>
    <div class="aprox">APROXIMADO</div>
    <div class="time" id="ncaTime">Horario: 23:50 - 00:56</div>
    <div class="days">Sábados y domingos</div>
    <div class="countdown" id="count1"></div>
</div>

<!-- Larga Distancia Rosario Norte -->
<div class="card">
    <h2>Larga Distancia • Rosario Norte</h2>
    <div class="time">Retiro → Luis María Drago</div>
    <div class="time">Horario: 19:50 - 20:30</div>
    <div class="days">Todos los días</div>
    <div class="countdown" id="count3"></div>
</div>

<!-- Ferrosur Roca Puerto Madero -->
<div class="card">
    <h2>Ferrosur Roca • Puerto Madero</h2>
    <div class="aprox">APROXIMADO</div>
    <div class="time">Horario: 18:50 - 19:10</div>
    <div class="days">Domingos</div>
    <div class="countdown" id="count4"></div>
</div>

</div>

<script>
// Configuración NCA
const ncaSchedules = [
    {startH:23,startM:50,endH:0,endM:56}, // primer NCA
    {startH:2,startM:30,endH:3,endM:50}   // segundo NCA
];
const ncaDays = [6,0]; // sábado=6, domingo=0

function getNextNCA(){
    const now = new Date();
    const day = now.getDay();
    if(!ncaDays.includes(day)) return null; // hoy no es sábado/domingo

    // Chequear primer horario
    let first = new Date();
    first.setHours(ncaSchedules[0].startH,ncaSchedules[0].startM,0,0);
    let firstEnd = new Date();
    firstEnd.setHours(ncaSchedules[0].endH,ncaSchedules[0].endM,0,0);
    if(now<firstEnd) return {start:first,end:firstEnd,text:`Horario: ${formatTime(ncaSchedules[0])}`};

    // Segundo horario después del primero
    let second = new Date();
    second.setHours(ncaSchedules[1].startH,ncaSchedules[1].startM,0,0);
    let secondEnd = new Date();
    secondEnd.setHours(ncaSchedules[1].endH,ncaSchedules[1].endM,0,0);
    if(now<secondEnd) return {start:second,end:secondEnd,text:`Horario: ${formatTime(ncaSchedules[1])}`};

    return null; // ambos pasaron
}

function formatTime(schedule){
    return `${String(schedule.startH).padStart(2,'0')}:${String(schedule.startM).padStart(2,'0')} - ${String(schedule.endH).padStart(2,'0')}:${String(schedule.endM).padStart(2,'0')}`;
}

// Larga distancia y Ferrosur
function getNextTrainTime(startH,startM,endH,endM,daysAllowed){
    const now = new Date();
    const day = now.getDay();
    let nextStart = new Date();
    nextStart.setHours(startH,startM,0,0);
    let nextEnd = new Date();
    nextEnd.setHours(endH,endM,0,0);
    if(daysAllowed.includes(day) && now<nextEnd){
        return nextStart>now?nextStart:nextEnd;
    } else {
        let addDays = 1;
        while(!daysAllowed.includes((day+addDays)%7)) addDays++;
        nextStart.setDate(nextStart.getDate()+addDays);
        return nextStart;
    }
}

function updateCountdown(id,startTime){
    if(!startTime){
        document.getElementById(id).innerHTML="Próximo tren: N/A";
        return;
    }
    const now = new Date();
    const diff = startTime - now;
    if(diff<0){
        document.getElementById(id).innerHTML="En curso o pasó";
        return;
    }
    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);
    const seconds = Math.floor((diff/1000)%60);
    document.getElementById(id).innerHTML=`${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(()=>{
    // NCA
    let nextNCA = getNextNCA();
    const ncaCard = document.getElementById('ncaCard');
    if(nextNCA){
        ncaCard.style.display='block';
        document.getElementById('ncaTime').innerText=nextNCA.text;
        updateCountdown("count1",nextNCA.start);
    } else {
        ncaCard.style.display='none';
    }

    // Larga distancia
    updateCountdown("count3",getNextTrainTime(19,50,20,30,[0,1,2,3,4,5,6]));
    // Ferrosur
    updateCountdown("count4",getNextTrainTime(18,50,19,10,[0]));
},1000);

// Buscador
const searchInput=document.getElementById("searchInput");
const cards=document.querySelectorAll(".card");
searchInput.addEventListener("input",function(){
    const value=this.value.toLowerCase();
    cards.forEach(card=>{
        card.style.display=card.innerText.toLowerCase().includes(value)?"block":"none";
    });
});
</script>

</body>
</html>
