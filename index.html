<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
    background-color:#0a0a0a; 
    background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 1px, transparent 1px),
                      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: 0 0, 20px 20px;
    color:white;
    padding:20px;
    min-height:100vh;
}
h1{
    text-align:center;
    margin-bottom:25px;
    font-size:40px;
    letter-spacing:2px;
    text-shadow: 0 0 10px #00ffea, 0 0 20px #ff00ff;
}
.search-box{
    max-width:600px;
    margin:0 auto 30px auto;
    position:relative;
}
.search-box input{
    width:100%;
    padding:15px 20px 15px 50px;
    border:none;
    border-radius:15px;
    background:rgba(20,20,20,0.9);
    color:white;
    font-size:18px;
    outline:none;
    box-shadow: 0 0 10px #00ffea, 0 0 20px #ff00ff;
}
.search-box input::placeholder{
    color:rgba(255,255,255,0.25);
}
.search-icon{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
    font-size:20px;
}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}
.card{
    background: rgba(15,15,15,0.95);
    padding:25px;
    border-radius:20px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 0 20px rgba(0,255,234,0.5), 0 0 40px rgba(255,0,255,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(0,255,234,0.7), 0 0 60px rgba(255,0,255,0.5);
}
.card h2{margin-bottom:10px;font-size:24px;}
.aprox{
    color:red;
    font-weight:bold;
    font-size:18px;
    margin-bottom:10px;
    text-transform: uppercase;
    text-shadow: 0 0 5px red, 0 0 10px rgba(255,0,0,0.5);
}
.time{font-size:18px;margin:10px 0;}
.countdown{font-size:22px;font-weight:bold;margin-top:15px;}
.days{color:#aaa;margin-top:10px;}
</style>
</head>
<body>

<h1>🌌 Ferrobloggers</h1>
<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Ferrobloggers" id="searchInput">
</div>

<div class="container">

<div class="card" id="ncaCard">
    <h2>NCA • Luis María Drago</h2>
    <div class="aprox">APROXIMADO</div>
    <div class="time" id="ncaTime"></div>
    <div class="days">Sábados y domingos</div>
    <div class="countdown" id="count1"></div>
</div>

<div class="card" id="ldCard">
    <h2>Larga Distancia • Luis María Drago</h2>
    <div class="time">Luis María Drago</div>
    <div class="time" id="ldTime1">Horario: 11:00 - 12:10</div>
    <div class="time" id="ldTime2">Horario: 17:50 - 18:50</div>
    <div class="time" id="ldTime3">Horario: 19:50 - 20:30</div>
    <div class="days">Todos los días</div>
    <div class="countdown" id="count2"></div>
</div>

<div class="card">
    <h2>Ferrosur Roca • Puerto Madero</h2>
    <div class="aprox">APROXIMADO</div>
    <div class="time">Horario: 18:50 - 19:10</div>
    <div class="days">Domingos</div>
    <div class="countdown" id="count3"></div>
</div>

</div>

<script>
// Configuración NCA
const ncaSchedules = [
    {startH:23,startM:50,endH:0,endM:56},
    {startH:2,startM:30,endH:3,endM:50}
];
const ncaDays = [6,0]; // sábado=6, domingo=0

function formatTime(schedule){
    return `${String(schedule.startH).padStart(2,'0')}:${String(schedule.startM).padStart(2,'0')} - ${String(schedule.endH).padStart(2,'0')}:${String(schedule.endM).padStart(2,'0')}`;
}

function getCurrentNCA(){
    const now = new Date();
    const day = now.getDay();
    if(!ncaDays.includes(day)) return getNextNCA();
    for(let i=0;i<ncaSchedules.length;i++){
        const s = ncaSchedules[i];
        let start = new Date(); start.setHours(s.startH,s.startM,0,0);
        let end = new Date(); end.setHours(s.endH,s.endM,0,0);
        if(i===0 && end<start) end.setDate(end.getDate()+1);
        if(i===1 && end<start) end.setDate(end.getDate()+1);
        if(now<end) return {schedule:s,start:start,end:end,text:`Horario: ${formatTime(s)}`};
    }
    return getNextNCA();
}

function getNextNCA(){
    const now = new Date();
    const day = now.getDay();
    let addDays = 1;
    while(!ncaDays.includes((day+addDays)%7)) addDays++;
    const nextDay = new Date(now); nextDay.setDate(now.getDate()+addDays);
    const s = ncaSchedules[0];
    let start = new Date(nextDay); start.setHours(s.startH,s.startM,0,0);
    return {schedule:s,start:start,end:null,text:`Próximo: ${formatTime(s)}`};
}

function getNextTrainTime(times, daysAllowed){
    const now = new Date();
    const day = now.getDay();
    for(const t of times){
        let start = new Date(); start.setHours(t.startH,t.startM,0,0);
        let end = new Date(); end.setHours(t.endH,t.endM,0,0);
        if(end<start) end.setDate(end.getDate()+1);
        if(daysAllowed.includes(day) && now<end) return start>now?start:end;
    }
    // Si ya pasaron, buscar siguiente día permitido
    let addDays = 1;
    while(!daysAllowed.includes((day+addDays)%7)) addDays++;
    const nextStart = new Date(); nextStart.setDate(now.getDate()+addDays);
    const t = times[0];
    nextStart.setHours(t.startH,t.startM,0,0);
    return nextStart;
}

function updateCountdown(id,startTime){
    if(!startTime){
        document.getElementById(id).innerHTML="Próximo tren: N/A";
        return;
    }
    const now = new Date();
    const diff = startTime - now;
    if(diff<0){
        document.getElementById(id).innerHTML="En curso o pasó";
        return;
    }
    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);
    const seconds = Math.floor((diff/1000)%60);
    document.getElementById(id).innerHTML=`${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(()=>{
    const nextNCA = getCurrentNCA();
    document.getElementById('ncaCard').style.display='block';
    document.getElementById('ncaTime').innerText=nextNCA.text;
    updateCountdown("count1",nextNCA.start);

    const ldTimes = [
        {startH:11,startM:0,endH:12,endM:10},
        {startH:17,startM:50,endH:18,endM:50},
        {startH:19,startM:50,endH:20,endM:30}
    ];
    updateCountdown("count2",getNextTrainTime(ldTimes,[0,1,2,3,4,5,6]));
    updateCountdown("count3",getNextTrainTime([{startH:18,startM:50,endH:19,endM:10}],[0]));
},1000);

const searchInput=document.getElementById("searchInput");
const cards=document.querySelectorAll(".card");
searchInput.addEventListener("input",function(){
    const value=this.value.toLowerCase();
    cards.forEach(card=>{
        card.style.display=card.innerText.toLowerCase().includes(value)?"block":"none";
    });
});
</script>

</body>
</html>
