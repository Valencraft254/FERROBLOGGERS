<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ferrobloggers</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  background:#050505;
  color:white;
  padding:20px;
}

@keyframes galaxyBorder{
  0%{border-color:#6a5cff; box-shadow:0 0 15px #6a5cff;}
  25%{border-color:#00c2ff; box-shadow:0 0 15px #00c2ff;}
  50%{border-color:#ff4fd8; box-shadow:0 0 15px #ff4fd8;}
  75%{border-color:#7dff7d; box-shadow:0 0 15px #7dff7d;}
  100%{border-color:#6a5cff; box-shadow:0 0 15px #6a5cff;}
}

header{
  text-align:center;
  margin-bottom:25px;
}

.logo{
  font-size:52px;
  font-weight:900;
  background:linear-gradient(90deg,#6a5cff,#00c2ff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.search-box{
  margin:25px auto;
  max-width:700px;
  position:relative;
}

.search-box::before{
  content:"🔍";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  opacity:.6;
}

input{
  width:100%;
  padding:16px 16px 16px 48px;
  border-radius:16px;
  border:2px solid #333;
  background:#111;
  color:white;
  font-size:17px;
  outline:none;
}

input::placeholder{
  color:rgba(255,255,255,.12);
  font-size:18px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#0d0d0d;
  border:2px solid #6a5cff;
  border-radius:20px;
  padding:20px;
  animation:galaxyBorder 6s linear infinite;
}

.linea{
  font-size:22px;
  font-weight:800;
  margin-bottom:10px;
}

.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  margin-bottom:15px;
}

.red{
  background:#2b0000;
  color:#ff3d3d;
}

.green{
  background:#002b0e;
  color:#57ff88;
}

.big{
  font-size:28px;
  font-weight:800;
  margin-top:10px;
}

.small{
  color:#bbb;
  margin-top:8px;
  line-height:1.6;
}
</style>
</head>
<body>

<header>
  <div class="logo">Ferrobloggers</div>
</header>

<div class="search-box">
  <input id="search" placeholder="Ferrobloggers">
</div>

<div class="grid" id="cards">

  <div class="card">
    <div class="linea">NCA • Luis María Drago</div>
    <div class="status red">APROXIMADO</div>
    <div class="big" id="nca1">Calculando...</div>
    <div class="small">Pasa entre 23:50 y 00:56 • sábados y domingos</div>
  </div>

  <div class="card">
    <div class="linea">NCA Madrugada • Drago</div>
    <div class="status red">APROXIMADO</div>
    <div class="big" id="nca2">Calculando...</div>
    <div class="small">Pasa entre 02:30 y 03:50 • sábados y domingos</div>
  </div>

  <div class="card">
    <div class="linea">Larga Distancia • Rosario Norte</div>
    <div class="status green">EN HORARIO</div>
    <div class="big" id="rosario">Calculando...</div>
    <div class="small">Retiro → Luis María Drago • 19:50 a 20:30</div>
  </div>

</div>

<script>
function nextWeekendTime(hour, minute){
  const now = new Date();
  let target = new Date(now);

  function setToNext(dayIndex){
    let diff = (dayIndex - now.getDay() + 7) % 7;
    target = new Date(now);
    target.setDate(now.getDate() + diff);
    target.setHours(hour, minute, 0, 0);

    if(target <= now){
      target.setDate(target.getDate() + 7);
    }
  }

  if(now.getDay() === 6 || now.getDay() === 0){
    target.setHours(hour, minute, 0, 0);
    if(target <= now){
      if(now.getDay() === 6){
        setToNext(0);
      } else {
        setToNext(6);
      }
    }
  } else {
    setToNext(6);
  }

  return target;
}

function nextDailyTime(hour, minute){
  const now = new Date();
  let target = new Date();
  target.setHours(hour, minute, 0, 0);

  if(target <= now){
    target.setDate(target.getDate() + 1);
  }

  return target;
}

function formatCountdown(target){
  const now = new Date();
  let diff = target - now;

  let days = Math.floor(diff / 86400000);
  diff %= 86400000;

  let hours = Math.floor(diff / 3600000);
  diff %= 3600000;

  let mins = Math.floor(diff / 60000);
  let secs = Math.floor((diff % 60000) / 1000);

  return `${days}d ${hours}h ${mins}m ${secs}s`;
}

function updateTimes(){
  document.getElementById("nca1").innerText =
    formatCountdown(nextWeekendTime(23,50));

  document.getElementById("nca2").innerText =
    formatCountdown(nextWeekendTime(2,30));

  document.getElementById("rosario").innerText =
    formatCountdown(nextDailyTime(19,50));
}

setInterval(updateTimes,1000);
updateTimes();

document.getElementById("search").addEventListener("input", function(){
  const text = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(text)
      ? "block"
      : "none";
  });
});
</script>

</body>
</html>
