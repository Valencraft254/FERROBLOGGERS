<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
    background: url('https://i.imgur.com/6X1wF1b.jpg') no-repeat center center fixed; 
    background-size: cover;
    color:white;
    padding:20px;
    min-height:100vh;
}
h1{text-align:center;margin-bottom:25px;font-size:40px;letter-spacing:2px;}
.search-box{max-width:600px;margin:0 auto 30px auto;position:relative;}
.search-box input{width:100%;padding:15px 20px 15px 50px;border:none;border-radius:15px;background:rgba(0,0,0,0.6);color:white;font-size:18px;outline:none;border:2px solid #333;}
.search-box input::placeholder{color:rgba(255,255,255,0.25);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:gray;font-size:20px;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:25px;}
.card{
    background: rgba(0,0,0,0.7);
    padding:25px;
    border-radius:20px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 0 15px #00ffea, 0 0 30px #ff00ff;
    border:2px solid;
    border-image-slice:1;
    border-width: 2px;
    border-image-source: linear-gradient(45deg, #ff00ff, #00ffff, #ffcc00, #ff00ff);
}
.card h2{margin-bottom:10px;font-size:24px;}
.aprox{color:red;font-weight:bold;font-size:18px;margin-bottom:10px;}
.time{font-size:18px;margin:10px 0;}
.countdown{font-size:22px;font-weight:bold;margin-top:15px;}
.days{color:#aaa;margin-top:10px;}
</style>
</head>
<body>

<h1>🌌 Ferrobloggers</h1>
<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Ferrobloggers" id="searchInput">
</div>

<div class="container">

<!-- NCA Luis María Drago -->
<div class="card" id="ncaCard">
    <h2>NCA • Luis María Drago</h2>
    <div class="aprox">APROXIMADO</div>
    <div class="time" id="ncaTime"></div>
    <div class="days">Sábados y domingos</div>
    <div class="countdown" id="count1"></div>
</div>

<!-- Larga Distancia solo Luis María Drago -->
<div class="card">
    <h2>Larga Distancia • Luis María Drago</h2>
    <div class="time">Retiro → Luis María Drago</div>
    <div class="time">Horario: 19:50 - 20:30</div>
    <div class="days">Todos los días</div>
    <div class="countdown" id="count2"></div>
</div>

<!-- Ferrosur Roca Puerto Madero -->
<div class="card">
    <h2>Ferrosur Roca • Puerto Madero</h2>
    <div class="aprox">APROXIMADO</div>
    <div class="time">Horario: 18:50 - 19:10</div>
    <div class="days">Domingos</div>
    <div class="countdown" id="count3"></div>
</div>

</div>

<script>
// Configuración NCA
const ncaSchedules = [
    {startH:23,startM:50,endH:0,endM:56},
    {startH:2,startM:30,endH:3,endM:50}
];
const ncaDays = [6,0]; // sábado=6, domingo=0

function formatTime(schedule){
    return `${String(schedule.startH).padStart(2,'0')}:${String(schedule.startM).padStart(2,'0')} - ${String(schedule.endH).padStart(2,'0')}:${String(schedule.endM).padStart(2,'0')}`;
}

function getCurrentNCA(){
    const now = new Date();
    const day = now.getDay();
    if(!ncaDays.includes(day)) return getNextNCA();
    for(let i=0;i<ncaSchedules.length;i++){
        const s = ncaSchedules[i];
        let start = new Date(); start.setHours(s.startH,s.startM,0,0);
        let end = new Date(); end.setHours(s.endH,s.endM,0,0);
        if(i===0 && end<start) end.setDate(end.getDate()+1);
        if(i===1 && end<start) end.setDate(end.getDate()+1);
        if(now<end) return {schedule:s,start:start,end:end,text:`Horario: ${formatTime(s)}`};
    }
    return getNextNCA();
}

function getNextNCA(){
    const now = new Date();
    const day = now.getDay();
    let addDays = 1;
    while(!ncaDays.includes((day+addDays)%7)) addDays++;
    const nextDay = new Date(now); nextDay.setDate(now.getDate()+addDays);
    const s = ncaSchedules[0];
    let start = new Date(nextDay); start.setHours(s.startH,s.startM,0,0);
    return {schedule:s,start:start,end:null,text:`Próximo: ${formatTime(s)}`};
}

function getNextTrainTime(startH,startM,endH,endM,daysAllowed){
    const now = new Date();
    const day = now.getDay();
    let nextStart = new Date(); nextStart.setHours(startH,startM,0,0);
    let nextEnd = new Date(); nextEnd.setHours(endH,endM,0,0);
    if(nextEnd<nextStart) nextEnd.setDate(nextEnd.getDate()+1);
    if(daysAllowed.includes(day) && now<nextEnd){
        return nextStart>now?nextStart:nextEnd;
    } else {
        let addDays = 1;
        while(!daysAllowed.includes((day+addDays)%7)) addDays++;
        nextStart.setDate(nextStart.getDate()+addDays);
        return nextStart;
    }
}

function updateCountdown(id,startTime){
    if(!startTime){
        document.getElementById(id).innerHTML="Próximo tren: N/A";
        return;
    }
    const now = new Date();
    const diff = startTime - now;
    if(diff<0){
        document.getElementById(id).innerHTML="En curso o pasó";
        return;
    }
    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);
    const seconds = Math.floor((diff/1000)%60);
    document.getElementById(id).innerHTML=`${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(()=>{
    const nextNCA = getCurrentNCA();
    document.getElementById('ncaCard').style.display='block';
    document.getElementById('ncaTime').innerText=nextNCA.text;
    updateCountdown("count1",nextNCA.start);

    updateCountdown("count2",getNextTrainTime(19,50,20,30,[0,1,2,3,4,5,6]));
    updateCountdown("count3",getNextTrainTime(18,50,19,10,[0]));
},1000);

const searchInput=document.getElementById("searchInput");
const cards=document.querySelectorAll(".card");
searchInput.addEventListener("input",function(){
    const value=this.value.toLowerCase();
    cards.forEach(card=>{
        card.style.display=card.innerText.toLowerCase().includes(value)?"block":"none";
    });
});
</script>

</body>
</html>
