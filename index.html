<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenes Argentinos Live</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fa;
}
header{
  background:#009fe3;
  color:white;
  padding:20px;
  text-align:center;
}
.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  flex-wrap:wrap;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
}
.section{
  padding:20px;
}
.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 14px rgba(0,0,0,.1);
  margin-top:20px;
}
.red{
  color:red;
  font-weight:bold;
}
iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:12px;
}
</style>
</head>
<body>

<header>
  <h1>🚆 Trenes Argentinos</h1>
  <p>Horarios en vivo • NCA • Rosario</p>
</header>

<div class="menu">
  <button onclick="cargarLinea('Mitre')">🚆 Mitre</button>
  <button onclick="cargarLinea('Roca')">🚆 Roca</button>
  <button onclick="cargarLinea('Sarmiento')">🚆 Sarmiento</button>
  <button onclick="cargarLinea('San Martín')">🚆 San Martín</button>
</div>

<div class="section">
  <div id="resultado" class="card">
    Elegí una línea para ver horarios en vivo
  </div>

  <div class="card">
    <h3>🚂 NCA</h3>
    <p>23:00 - 23:20</p>
    <p>02:30 - 02:45</p>
    <p class="red">APROXIMADO</p>
  </div>

  <div class="card">
    <h3>🚄 Rosario</h3>
    <p>Sale: 19:40</p>
    <p>Llega Drago: 20:15 - 20:40</p>
  </div>
</div>

<script>
function cargarLinea(linea){
  const box = document.getElementById("resultado")

  box.innerHTML = `
    <h3>🚆 Línea ${linea}</h3>
    <p>Horarios en vivo</p>
    <iframe src="https://quetren.com/"></iframe>
  `
}
</script>

</body>
</html>
