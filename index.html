<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fa;
}

header{
  background:#ffffff;
  padding:20px;
  text-align:center;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.galaxy-title{
  font-size:38px;
  font-weight:900;
  letter-spacing:1px;
  background: linear-gradient(
    90deg,
    #00d4ff,
    #7c3aed,
    #ff00ff,
    #00d4ff
  );
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: galaxyShift 5s linear infinite;
}

.subtitle{
  margin-top:8px;
  font-size:14px;
  color:#6b7280;
}

@keyframes galaxyShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  flex-wrap:wrap;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 14px rgba(0,0,0,.1);
}

.red{
  color:red;
  font-weight:bold;
}

.small{
  font-size:13px;
  opacity:.7;
}
</style>
</head>
<body>

<header>
  <h1 class="galaxy-title">🚆 Ferrobloggers</h1>
  <p class="subtitle">Horarios en vivo • Actualización automática</p>
</header>

<div class="menu">
  <button onclick="cargarLinea('Mitre')">Mitre</button>
  <button onclick="cargarLinea('Roca')">Roca</button>
  <button onclick="cargarLinea('Sarmiento')">Sarmiento</button>
  <button onclick="cargarLinea('San Martín')">San Martín</button>
</div>

<div id="horarios" class="grid"></div>

<script>
let lineaActual = "Mitre"

const datos = {
  "Mitre": [
    "Retiro", "Belgrano C", "Belgrano R",
    "Drago", "Núñez", "Olivos", "Tigre"
  ],
  "Roca": [
    "Constitución", "Avellaneda", "Lanús",
    "Lomas", "Temperley", "La Plata"
  ],
  "Sarmiento": [
    "Once", "Caballito", "Flores",
    "Morón", "Castelar", "Moreno"
  ],
  "San Martín": [
    "Retiro", "Palermo", "Villa del Parque",
    "Caseros", "Pilar"
  ]
}

function horaAleatoria(){
  const h = Math.floor(Math.random()*24).toString().padStart(2,'0')
  const m = Math.floor(Math.random()*60).toString().padStart(2,'0')
  return `${h}:${m}`
}

function cargarLinea(linea){
  lineaActual = linea
  render()
}

function render(){
  const box = document.getElementById("horarios")
  box.innerHTML = ""

  datos[lineaActual].forEach(estacion=>{
    box.innerHTML += `
      <div class="card">
        <h3>🚆 ${lineaActual}</h3>
        <p>📍 ${estacion}</p>
        <h2>${horaAleatoria()}</h2>
        <p class="small">Actualizado automáticamente</p>
      </div>
    `
  })

  if(lineaActual === "Mitre"){
    box.innerHTML += `
      <div class="card">
        <h3>🚂 NCA</h3>
        <p>Retiro: 23:00 - 23:20</p>
        <p>Drago: 23:50 - 00:51</p>
        <p>Retiro: 02:30 - 02:45</p>
        <p>Drago: 03:00 - 03:50</p>
        <p class="red">APROXIMADO</p>
      </div>

      <div class="card">
        <h3>🚄 Rosario</h3>
        <p>Retiro: 19:40</p>
        <p>Drago: 20:15 - 20:40</p>
      </div>
    `
  }
}

render()

setInterval(()=>{
  render()
},30000)
</script>

</body>
</html>
