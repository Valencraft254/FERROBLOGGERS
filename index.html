<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
    background:#000;
    color:white;
    padding:20px;
    min-height:100vh;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:40px;
    text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:#0b0b0b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,255,.4),0 0 30px rgba(255,0,255,.3);
}

.card h2{
    margin-bottom:10px;
}

.time{
    margin:10px 0;
}

.days{
    color:#aaa;
}

.countdown{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<h1>🌌 Ferrobloggers</h1>

<h2 style="margin:20px 0;">🚆 Trenes en Tiempo Real</h2>

<select id="lineSelector" style="
width:100%;
padding:15px;
border-radius:15px;
background:#111;
color:white;
margin-bottom:20px;
box-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
">
<option value="">Seleccionar línea</option>
</select>

<div class="container" id="apiContainer"></div>

<script>

/* líneas reales */
const lineas = [
    "Roca",
    "Sarmiento",
    "Mitre",
    "San Martín",
    "Belgrano Sur",
    "Belgrano Norte",
    "Tren de la Costa"
];

const selector = document.getElementById("lineSelector");
const apiContainer = document.getElementById("apiContainer");

lineas.forEach(l=>{
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    selector.appendChild(opt);
});

/* 🔴 ACA VA LA API REAL */
async function getTrenes(linea){
    try{
        // EJEMPLO (cuando tengas API real)
        /*
        const res = await fetch("URL_API_REAL");
        const data = await res.json();

        return data;
        */

        return []; // sin datos fake
    }catch(e){
        return [];
    }
}

/* render */
selector.addEventListener("change", async ()=>{
    const linea = selector.value;
    apiContainer.innerHTML = "";

    if(!linea) return;

    // loading
    apiContainer.innerHTML = "<div class='card'>Cargando datos en tiempo real...</div>";

    const trenes = await getTrenes(linea);

    apiContainer.innerHTML = "";

    if(trenes.length === 0){
        apiContainer.innerHTML = `
            <div class="card">
                <h2>Línea ${linea}</h2>
                <div class="days">Sin datos en tiempo real disponibles</div>
            </div>
        `;
        return;
    }

    trenes.forEach(t=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h2>Línea ${linea}</h2>
            <div class="time">Destino: ${t.destino}</div>
            <div class="time">Andén: ${t.anden || "?"}</div>
            <div class="time">Hora: ${t.hora}</div>
            <div class="days">Actualizado en vivo</div>
        `;

        apiContainer.appendChild(card);
    });
});

</script>

</body>
</html>
