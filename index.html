<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#fff;padding:20px;color:#111}
header{
  padding:30px;
  border-radius:20px;
  background:linear-gradient(135deg,#fff,#f5f5ff);
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  margin-bottom:20px;
  text-align:center
}
.logo{
  font-size:48px;
  font-weight:900;
  background:linear-gradient(90deg,#6a5cff,#00c2ff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent
}
select{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:14px;
  margin-bottom:20px;
  font-size:16px
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:18px
}
.card{
  background:#fff;
  border:1px solid #eee;
  border-radius:18px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06)
}
.linea{font-size:20px;font-weight:700;margin-bottom:10px}
.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  margin-bottom:12px;
  background:#e8fff0;
  color:#0a8a3a
}
.big{
  font-size:24px;
  font-weight:700;
  margin-top:10px
}
.small{
  margin-top:8px;
  color:#666
}
</style>
</head>
<body>

<header>
  <div class="logo">Ferrobloggers</div>
  <div>Horarios en vivo estilo Trencitos</div>
</header>

<select id="estacion">
  <option value="Retiro">Retiro</option>
  <option value="Luis María Drago">Luis María Drago</option>
  <option value="Belgrano C">Belgrano C</option>
  <option value="Palermo">Palermo</option>
</select>

<div class="grid" id="cards"></div>

<script>
const horariosCustom = [
  {
    linea:"Larga Distancia - Rosario",
    hora:"19:57",
    destino:"Rosario Norte",
    estacion:"Luis María Drago"
  },
  {
    linea:"Larga Distancia - Rosario",
    hora:"20:25",
    destino:"Rosario Norte",
    estacion:"Luis María Drago"
  },
  {
    linea:"NCA",
    hora:"23:50",
    destino:"Carga",
    estacion:"Luis María Drago"
  },
  {
    linea:"NCA",
    hora:"00:57",
    destino:"Carga",
    estacion:"Luis María Drago"
  }
];

function renderCards(datos){
  const cont = document.getElementById("cards");

  cont.innerHTML = datos.map(t => `
    <div class="card">
      <div class="linea">${t.linea}</div>
      <div class="status">En vivo</div>
      <div class="big">${t.hora}</div>
      <div class="small">Destino: ${t.destino}</div>
      <div class="small">Estación: ${t.estacion}</div>
    </div>
  `).join("");
}

function cargarHorarios(){
  // después acá conectamos Trencitos
  renderCards(horariosCustom);
}

cargarHorarios();
setInterval(cargarHorarios,30000);
</script>

</body>
</html>
