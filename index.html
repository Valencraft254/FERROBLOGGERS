<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenes Argentinos Live</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fa;
}
header{
  background:#009fe3;
  color:white;
  padding:20px;
  text-align:center;
}
.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  flex-wrap:wrap;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 14px rgba(0,0,0,.1);
}
.red{
  color:red;
  font-weight:bold;
}
</style>
</head>
<body>

<header>
  <h1>🚆 Trenes Argentinos</h1>
  <p>Horarios en vivo • estilo app</p>
</header>

<div class="menu">
  <button onclick="cargarHorarios('Mitre')">🚆 Mitre</button>
  <button onclick="cargarHorarios('Roca')">🚆 Roca</button>
  <button onclick="cargarHorarios('Sarmiento')">🚆 Sarmiento</button>
  <button onclick="cargarHorarios('San Martín')">🚆 San Martín</button>
</div>

<div id="horarios" class="grid"></div>

<div class="grid">
  <div class="card">
    <h3>🚂 NCA</h3>
    <p>Sale: 23:00 - 23:20</p>
    <p>Llega Drago: 23:50 - 00:51</p>
    <p>Sale: 02:30 - 02:45</p>
    <p>Llega Drago: 03:00 - 03:50</p>
    <p class="red">APROXIMADO</p>
  </div>

  <div class="card">
    <h3>🚄 Rosario</h3>
    <p>Sale Retiro: 19:40</p>
    <p>Llega Drago: 20:15 - 20:40</p>
  </div>
</div>

<script>
function cargarHorarios(linea){
  const horarios = document.getElementById("horarios")

  // acá después conectamos API real
  const ejemplo = [
    {estacion:"Retiro",hora:"19:40",estado:"En 5 min"},
    {estacion:"Belgrano R",hora:"19:52",estado:"En 17 min"},
    {estacion:"Drago",hora:"20:05",estado:"En 30 min"}
  ]

  horarios.innerHTML = ""

  ejemplo.forEach(t => {
    horarios.innerHTML += `
      <div class="card">
        <h3>🚆 Línea ${linea}</h3>
        <p>📍 ${t.estacion}</p>
        <h2>${t.hora}</h2>
        <p>${t.estado}</p>
      </div>
    `
  })
}
</script>

</body>
</html>
