<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    padding:20px;
    min-height:100vh;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:40px;
    letter-spacing:2px;
}

.search-box{
    max-width:600px;
    margin:0 auto 30px auto;
    position:relative;
}

.search-box input{
    width:100%;
    padding:15px 20px 15px 50px;
    border:none;
    border-radius:15px;
    background:#111;
    color:white;
    font-size:18px;
    outline:none;
    border:2px solid #333;
}

.search-box input::placeholder{
    color:rgba(255,255,255,0.25);
}

.search-icon{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
    font-size:20px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:#111;
    padding:25px;
    border-radius:20px;
    position:relative;
    overflow:hidden;
    border:3px solid transparent;
    animation:borderGalaxy 6s linear infinite;
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

@keyframes borderGalaxy{
    0%{border-color:#8a2be2;}
    25%{border-color:#00ffff;}
    50%{border-color:#ff00ff;}
    75%{border-color:#4b0082;}
    100%{border-color:#8a2be2;}
}

.card h2{
    margin-bottom:10px;
    font-size:24px;
}

.aprox{
    color:red;
    font-weight:bold;
    font-size:18px;
    margin-bottom:10px;
}

.time{
    font-size:18px;
    margin:10px 0;
}

.countdown{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}

.days{
    color:#aaa;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>🌌 Ferrobloggers</h1>

<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Ferrobloggers" id="searchInput">
</div>

<div class="container" id="cardsContainer">

    <div class="card">
        <h2>NCA • Luis María Drago</h2>
        <div class="aprox">APROXIMADO</div>
        <div class="time">Horario: 23:50 - 00:56</div>
        <div class="days">Sábados y domingos</div>
        <div class="countdown" id="count1"></div>
    </div>

    <div class="card">
        <h2>NCA • Luis María Drago</h2>
        <div class="aprox">APROXIMADO</div>
        <div class="time">Horario: 02:30 - 03:50</div>
        <div class="days">Sábados y domingos</div>
        <div class="countdown" id="count2"></div>
    </div>

    <div class="card">
        <h2>Larga Distancia • Rosario Norte</h2>
        <div class="aprox">APROXIMADO</div>
        <div class="time">Retiro → Luis María Drago</div>
        <div class="time">Horario: 19:50 - 20:30</div>
        <div class="days">Todos los días</div>
        <div class="countdown" id="count3"></div>
    </div>

</div>

<script>
function nextWeekendTime(hour, minute){
    const now = new Date();
    let next = new Date();

    const day = now.getDay(); // 0 domingo 6 sábado
    const validDays = [0,6];

    if(validDays.includes(day)){
        next.setHours(hour, minute, 0, 0);
        if(now > next){
            next.setDate(next.getDate() + (day === 6 ? 1 : 6));
        }
    } else {
        let daysUntilSaturday = (6 - day + 7) % 7;
        next.setDate(now.getDate() + daysUntilSaturday);
        next.setHours(hour, minute, 0, 0);
    }

    return next;
}

function nextDailyTime(hour, minute){
    const now = new Date();
    let next = new Date();
    next.setHours(hour, minute, 0, 0);

    if(now > next){
        next.setDate(next.getDate()+1);
    }

    return next;
}

function updateCountdown(id, targetFunc, hour, minute){
    const now = new Date();
    const target = targetFunc(hour, minute);

    const diff = target - now;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById(id).innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(()=>{
    updateCountdown("count1", nextWeekendTime, 23, 50);
    updateCountdown("count2", nextWeekendTime, 2, 30);
    updateCountdown("count3", nextDailyTime, 19, 50);
},1000);

const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("input", function(){
    const value = this.value.toLowerCase();

    cards.forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(value)
            ? "block"
            : "none";
    });
});
</script>

</body>
</html>
