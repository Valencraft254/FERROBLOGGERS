<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#ffffff;color:#111;padding:20px}
header{padding:30px 20px;border-radius:20px;background:linear-gradient(135deg,#ffffff,#f4f4ff);box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:20px;text-align:center}
.logo{font-size:48px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,#6a5cff,#00c2ff,#ff4fd8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{margin-top:8px;color:#666}
.controls{display:grid;grid-template-columns:2fr 1fr;gap:15px;margin-bottom:20px}
input,select{padding:14px;border:1px solid #ddd;border-radius:14px;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.card{background:#fff;border:1px solid #eee;border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.linea{font-size:20px;font-weight:700;margin-bottom:10px}
.status{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:12px}
.ok{background:#e8fff0;color:#0a8a3a}
.delay{background:#ffe8e8;color:#d10000}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px;text-align:left;border-bottom:1px solid #eee;font-size:14px}
.red{color:#d10000;font-weight:700}
.youtube{margin-top:30px;text-align:center}
.youtube a{text-decoration:none;color:#ff0000;font-weight:700;font-size:20px}
footer{margin-top:25px;text-align:center;color:#777;font-size:13px}
</style>
</head>
<body>

<header>
<div class="logo">Ferrobloggers</div>
<div class="sub">Estado en tiempo real estilo QuéTren</div>
</header>

<div class="controls">
<input type="text" id="busqueda" placeholder="Buscar estación...">
<select>
<option>Todas las líneas y estaciones</option>
<option>Mitre Tigre</option>
<option>Mitre Suárez</option>
<option>Mitre Zárate</option>
<option>San Martín</option>
<option>Tren de la Costa</option>
<option>Rosario</option>
</select>
</div>

<div class="grid">
<div class="card">
<div class="linea">Línea Mitre - Tigre</div>
<div class="status ok">En horario</div>
<table class="table">
<tr><th>Andén</th><th>Horario</th><th>Destino</th><th>Estación</th></tr>
<tr><td>1</td><td>12:10</td><td>Tigre</td><td>Retiro</td></tr>
</table>
</div>
</div>

<div class="youtube">
<a href="https://youtube.com/@ferrobloggers?si=32u1gvdCEDCt2pY3" target="_blank">▶️ @ferrobloggers</a>
</div>

<footer>Diseñado para GitHub Pages • datos ferroviarios en tiempo real</footer>

<script>
const buscador=document.getElementById('busqueda');
const cards=document.querySelectorAll('.card');

buscador.addEventListener('input',function(){
 const t=this.value.toLowerCase();
 cards.forEach(c=>{
   c.style.display=c.innerText.toLowerCase().includes(t)?'block':'none';
 });
});
</script>

</body>
</html>
