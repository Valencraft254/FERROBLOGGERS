<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenes Argentinos</title>
<style>
:root{
  --azul:#009fe3;
  --azul-claro:#eaf7fd;
  --gris:#f8fafc;
  --texto:#1f2937;
  --rojo:#dc2626;
}
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef6fb);
  color:var(--texto);
}
.container{
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}
.header{
  text-align:center;
  background:#fff;
  border-radius:24px;
  padding:40px 20px;
  box-shadow:0 6px 24px rgba(0,159,227,.12);
}
.header h1{
  color:var(--azul);
}
.schedules{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:30px;
}
.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}
.time{
  font-size:28px;
  font-weight:bold;
}
.status{
  display:inline-block;
  margin-top:10px;
  padding:8px 14px;
  border-radius:20px;
  background:#dbeafe;
}
.aprox{
  background:#fee2e2;
  color:#b91c1c;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🚆 Trenes Argentinos</h1>
    <p>Horarios • Próximos servicios</p>
  </div>

  <div class="schedules">
    <div class="card">
      <h3>🚆 Línea Mitre</h3>
      <p>Estación: Retiro</p>
      <div class="time">19:40</div>
      <p>Destino: Tigre</p>
      <span class="status">En 5 min</span>
    </div>

    <div class="card">
      <h3>🚂 NCA</h3>
      <p>Retiro → Drago</p>
      <div class="time">23:00 - 23:20</div>
      <span class="status aprox">APROXIMADO</span>
    </div>

    <div class="card">
      <h3>🚄 Rosario</h3>
      <p>Salida: Retiro 19:40</p>
      <p>Llegada Drago: 20:15 - 20:40</p>
    </div>
  </div>
</div>

</body>
</html>
