<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}
body{
  background:#fff;
  color:#111;
  padding:20px;
}
header{
  padding:30px;
  border-radius:20px;
  background:linear-gradient(135deg,#fff,#f6f6ff);
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  text-align:center;
  margin-bottom:20px;
}
.logo{
  font-size:48px;
  font-weight:900;
  background:linear-gradient(90deg,#6a5cff,#00c2ff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{
  margin-top:8px;
  color:#666;
}
.controls{
  display:grid;
  gap:12px;
  margin-bottom:20px;
}
input,select{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:14px;
  font-size:16px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:18px;
}
.card{
  background:#fff;
  border:1px solid #eee;
  border-radius:18px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
}
.linea{
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}
.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  margin-bottom:12px;
}
.ok{
  background:#e8fff0;
  color:#0a8a3a;
}
.delay{
  background:#ffe8e8;
  color:#d10000;
}
.big{
  font-size:28px;
  font-weight:700;
  margin-top:10px;
}
.small{
  color:#666;
  margin-top:8px;
}
.red{
  color:#d10000;
}
</style>
</head>
<body>

<header>
  <div class="logo">Ferrobloggers</div>
  <div class="sub">Horarios automáticos • actualización cada 5s</div>
</header>

<div class="controls">
  <input type="text" id="busqueda" placeholder="Buscar línea o estación...">

  <select id="linea">
    <option>Mitre - Tigre</option>
    <option>Mitre - Suárez</option>
    <option>San Martín</option>
    <option>Sarmiento</option>
    <option>Roca</option>
  </select>

  <select id="origen">
    <option>Estación donde estoy</option>
    <option>Retiro</option>
    <option>Belgrano C</option>
    <option>Luis María Drago</option>
    <option>Palermo</option>
    <option>Once</option>
  </select>

  <select id="destino">
    <option>Estación a donde quiero ir</option>
    <option>Tigre</option>
    <option>Rosario Norte</option>
    <option>Pilar</option>
    <option>Moreno</option>
  </select>
</div>

<div class="grid" id="cards">

  <div class="card">
    <div class="linea" id="lineaActual">Mitre - Tigre</div>
    <div class="status ok" id="estado">En horario</div>
    <div class="big" id="horaProxima">Cargando...</div>
    <div class="small" id="ruta">Retiro → Tigre</div>
  </div>

  <div class="card">
    <div class="linea">Larga Distancia - Rosario</div>
    <div class="status ok">En horario</div>
    <div class="big">19:57</div>
    <div class="small">Luis María Drago → Rosario Norte</div>
    <div class="big">20:25</div>
    <div class="small">Luis María Drago → Rosario Norte</div>
  </div>

  <div class="card">
    <div class="linea">NCA</div>
    <div class="status delay">Aproximado</div>
    <div class="big red">23:50</div>
    <div class="small">Luis María Drago</div>
    <div class="big red">00:57</div>
    <div class="small">Luis María Drago</div>
  </div>

</div>

<script>
function actualizarHorario(){
  const ahora = new Date();
  const minutos = ahora.getMinutes();

  let falta = 10 - (minutos % 10);
  if(falta === 10) falta = 0;

  const linea = document.getElementById("linea").value;
  const origen = document.getElementById("origen").value;
  const destino = document.getElementById("destino").value;

  document.getElementById("lineaActual").innerHTML = linea;
  document.getElementById("ruta").innerHTML = origen + " → " + destino;

  if(falta <= 1){
    document.getElementById("estado").innerHTML = "Llegando";
    document.getElementById("estado").className = "status delay";
    document.getElementById("horaProxima").innerHTML = "🚆 Llegando";
  }else{
    document.getElementById("estado").innerHTML = "En horario";
    document.getElementById("estado").className = "status ok";
    document.getElementById("horaProxima").innerHTML =
      "Próximo en " + falta + " min";
  }
}

setInterval(actualizarHorario,5000);
actualizarHorario();

document.querySelectorAll("select").forEach(s=>{
  s.addEventListener("change",actualizarHorario);
});

document.getElementById("busqueda").addEventListener("input",function(){
  const texto = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(texto)
      ? "block"
      : "none";
  });
});
</script>

</body>
</html>
