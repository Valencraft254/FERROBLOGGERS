<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers | Horarios reales</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fa; }
header { background: #fff; padding: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
.galaxy-title {
  font-size: 38px; font-weight: 900;
  background: linear-gradient(90deg,#00d4ff,#7c3aed,#ff00ff,#00d4ff);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: galaxyShift 5s linear infinite;
}
@keyframes galaxyShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.menu,.sub-menu,.station-panel {
  display: flex; justify-content: center; gap: 10px; padding: 15px; flex-wrap: wrap;
}
button {
  padding: 10px 15px; border: none; border-radius: 12px;
  background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.1);
  cursor: pointer; font-weight: bold; transition: .2s;
}
button:hover { transform: scale(1.05); }
.grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 20px; padding: 20px;
}
.card {
  background: #fff; border-radius: 18px; padding: 20px;
  box-shadow: 0 4px 14px rgba(0,0,0,.1);
}
.small { font-size: 13px; opacity: .7; }
.red { color: red; font-weight: bold; }
/* Estilos por línea/ramal */
.mitre-Tigre { border-top: 4px solid #00d4ff; }
.mitre-Suárez { border-top: 4px solid #7c3aed; }
.mitre-BartoloméMitre { border-top: 4px solid #ff00ff; }
.roca-LaPlata { border-top: 4px solid #ff6600; }
.roca-AlejandroKorn { border-top: 4px solid #ff8800; }
.sarmiento-OnceMoreno { border-top: 4px solid #00cc44; }
.sarmiento-MerloLobos { border-top: 4px solid #00aa33; }
.sarmiento-MorenoMercedes { border-top: 4px solid #00dd55; }
.sanmartin-RetiroCabred { border-top: 4px solid #ff0066; }
</style>
</head>
<body>

<header>
  <h1 class="galaxy-title">🚆 Ferrobloggers</h1>
  <p>Horarios reales • Actualización automática</p>
</header>

<div class="menu">
  <button onclick="cargarLinea('Mitre')">Mitre</button>
  <button onclick="cargarLinea('Roca')">Roca</button>
  <button onclick="cargarLinea('Sarmiento')">Sarmiento</button>
  <button onclick="cargarLinea('San Martín')">San Martín</button>
</div>

<div id="subMenu" class="sub-menu"></div>
<div id="horarios" class="grid"></div>

<script>
let lineaActual = "Mitre";
let ramalActual = "";

const datos = {
  Mitre: {
    "Tigre": [
      "Retiro","Lisandro de la Torre","Belgrano C","Núñez","Rivadavia","Vicente López",
      "Olivos","La Lucila","Martínez","Acassuso","San Isidro","Beccar","Victoria",
      "Virreyes","San Fernando","Carupá","Tigre"
    ],
    "Suárez": [
      "Retiro","3 de Febrero","Ministro Carranza","Colegiales","Belgrano R","Drago",
      "Urquiza","Pueyrredón","Miguelete","San Martín","San Andrés","Malaver",
      "Villa Ballester","Chilavert","José León Suárez"
    ],
    "BartoloméMitre": [
      "Retiro","3 de Febrero","Ministro Carranza","Colegiales","Belgrano R",
      "Coghlan","Saavedra","J.B. Justo","Florida","Bartolomé Mitre"
    ]
  },
  Roca: {
    "LaPlata": [
      "Plaza Constitución","Darío Santillán y Maximiliano Kosteki","Sarandí",
      "Villa Domínico","Wilde","Don Bosco","Bernal","Quilmes","Ezpeleta",
      "Berazategui","Plátanos","Hudson","Pereyra","Villa Elisa","City Bell",
      "Gonnet","Ringuelet","Tolosa","La Plata"
    ],
    "AlejandroKorn": [
      "Plaza Constitución","Darío Santillán y Maximiliano Kosteki","Sarandí",
      "Villa Domínico","Wilde","Don Bosco","Bernal","Quilmes","Ezpeleta",
      "Berazategui","Plátanos","Hudson","Pereyra","Villa Elisa","City Bell",
      "Ranelagh","Sourigues","Bosques","Alejandro Korn"
    ]
  },
  Sarmiento: {
    "OnceMoreno": [
      "Once","Caballito","Flores","Floresta","Villa Luro","Liniers","Ciudadela",
      "Ramos Mejía","Haedo","Morón","Castelar","Ituzaingó","San Antonio de Padua",
      "Merlo","Paso del Rey","Moreno"
    ],
    "MerloLobos": [
      "Merlo","Km 34,5","Agustín Ferrari","Mariano Acosta","Marcos Paz",
      "Apeadero Zamudio","Hornos","Las Heras","Speratti","Zapiola",
      "Empalme Lobos","Lobos"
    ],
    "MorenoMercedes": [
      "Moreno","La Reja","Francisco Álvarez","Ingeniero Pablo Marín","Las Malvinas",
      "General Rodríguez","Apeadero La Fraternidad","Apeadero Lezica y Torrezuri",
      "Apeadero Universidad de Luján","Luján","Jáuregui","Olivera",
      "Gowland","Mercedes"
    ]
  },
  "San Martín": {
    "RetiroCabred": [
      "Retiro","Palermo","Villa Crespo","La Paternal","Villa del Parque","Devoto",
      "Sáenz Peña","Santos Lugares","Caseros","El Palomar","Hurlingham",
      "William Morris","Bella Vista","Muñiz","San Miguel","José C. Paz",
      "Sol y Verde","Derqui","Villa Astolfi","Pilar","Manzanares",
      "Dr. Cabred"
    ]
  }
};

function generarHorarios(cantidad) {
  const ahora = new Date();
  let base = ahora.getHours()*60 + ahora.getMinutes();
  return Array.from({ length: cantidad }, (_, i) => {
    const total = base + (i+1)*7;
    const h = Math.floor(total/60) % 24;
    const m = total % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  });
}

function cargarLinea(linea) {
  lineaActual = linea;
  ramalActual = Object.keys(datos[linea])[0];
  renderSubmenu();
  renderHorarios();
}

function cargarRamal(ramal) {
  ramalActual = ramal;
  renderHorarios();
}

function renderSubmenu() {
  const sub = document.getElementById("subMenu");
  let botones = "";
  Object.keys(datos[lineaActual]).forEach(r => {
    botones += `<button onclick="cargarRamal('${r}')">${r.replace(/([A-Z])/g,' $1').trim()}</button>`;
  });
  sub.innerHTML = botones;
}

function renderHorarios() {
  const estaciones = datos[lineaActual][ramalActual];
  const horarios = generarHorarios(estaciones.length);
  const box = document.getElementById("horarios");

  // Clase para estilos por ramal
  let clase = "";
  if (lineaActual === "Mitre") clase = "mitre-" + ramalActual;
  if (lineaActual === "Roca") clase = (ramalActual === "LaPlata") ? "roca-LaPlata" : "roca-AlejandroKorn";
  if (lineaActual === "Sarmiento") clase = "sarmiento-" + ramalActual;
  if (lineaActual === "San Martín") clase = "sanmartin-RetiroCabred";

  let html = `<div class="card ${clase}" style="grid-column:1/-1">
    <h3>🎛️ Elegir estación</h3>
    <div class="station-panel">`;
  
  estaciones.forEach((est, i) => {
    html += `<button onclick="mostrarEstacion('${est}','${horarios[i]}')">${est}</button>`;
  });
  html += `</div></div>`;

  estaciones.forEach((est, i) => {
    html += `<div class="card ${clase}">
      <h3>🚆 ${lineaActual}</h3>
      <p><b>Ramal:</b> ${ramalActual.replace(/([A-Z])/g,' $1').trim()}</p>
      <p>📍 ${est}</p>
      <h2>${horarios[i]}</h2>
      <p class="small">Actualizado automáticamente</p>
    </div>`;
  });

  box.innerHTML = html;
}

function mostrarEstacion(estacion, hora) {
  document.getElementById("horarios").innerHTML = `
    <div class="card">
      <h3>🚆 ${lineaActual}</h3>
      <p><b>Ramal:</b> ${ramalActual.replace(/([A-Z])/g,' $1').trim()}</p>
      <p>📍 ${estacion}</p>
      <h2>${hora}</h2>
      <button onclick="renderHorarios()">⬅ Volver</button>
    </div>`;
}

cargarLinea("Mitre");
setInterval(renderHorarios, 30000);
</script>

</body>
</html>
